<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shapes</title>
    <style>
        .container {
            position: relative;
            width: 400px;
            height: 250px;
            margin: 50px;
        }

        .rectangle {
            width: 180px;
            height: 180px;
            background-color: blue;
            position: absolute;
            left: 50px;
            top: 30px;
        }

        .circle {
            width: 150px;
            height: 150px;
            background-color: yellow;
            border: 6px solid red;
            border-radius: 50%;
            position: absolute;
            left: 160px;
            top: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rectangle"></div>
        <div class="circle"></div>
    </div>
</body>
</html>
