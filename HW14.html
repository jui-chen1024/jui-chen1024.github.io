<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shapes</title>

<style>

.container{
    position: relative;
    width: 400px;
    height: 250px;
    margin: 50px;
}

/* 正方形 */
.rectangle{
    width: 180px;
    height: 180px;
    background-color: blue;
    border: 5px solid black;
    position: absolute;
    left: 50px;
    top: 40px;
}

/* 圓形 */
.circle{
    width: 150px;
    height: 150px;
    background-color: yellow;
    border: 5px solid red;
    border-radius: 50%;
    position: absolute;
    left: 150px;
    top: 60px;
}

</style>
</head>

<body>

<div class="container">
    <div class="rectangle"></div>
    <div class="circle"></div>
</div>

</body>
</html>
