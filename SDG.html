<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDG 4: Global Education Equity</title>

<style>
:root {
    --primary-blue: #2c7da0;
    --primary-green: #468c45;
    --light-bg: #f4f7f6;
    --white: #ffffff;
    --text: #333;
}

body {
    margin: 0;
    font-family: sans-serif;
}

.map-container {
    position: relative;
    width: 100%;
    max-width: 1000px;
    margin: 100px auto;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    aspect-ratio: 2/1;
    background-color: #e0f2f1;
    border-radius: 20px;
}

.hotspot {
    position: absolute;
    width: 14px;
    height: 14px;
    background: red;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
}
</style>
</head>

<body>

<h2 style="text-align:center;">20 Areas Lacking Resources</h2>

<div class="map-container">

<!-- 非洲 -->
<div class="hotspot" style="top:49%; left:49%;" onclick="showInfo('Niger')"></div>
<div class="hotspot" style="top:51%; left:47%;" onclick="showInfo('Northern Nigeria')"></div>
<div class="hotspot" style="top:67%; left:52%;" onclick="showInfo('DR Congo')"></div>
<div class="hotspot" style="top:58%; left:56%;" onclick="showInfo('Ethiopia')"></div>
<div class="hotspot" style="top:74%; left:54%;" onclick="showInfo('Malawi')"></div>
<div class="hotspot" style="top:45%; left:54%;" onclick="showInfo('Sudan')"></div>
<div class="hotspot" style="top:72%; left:49%;" onclick="showInfo('Angola')"></div>
<div class="hotspot" style="top:48%; left:45%;" onclick="showInfo('Mali')"></div>

<!-- 亞洲 -->
<div class="hotspot" style="top:43%; left:63%;" onclick="showInfo('Afghanistan')"></div>
<div class="hotspot" style="top:52%; left:69%;" onclick="showInfo('Bangladesh')"></div>
<div class="hotspot" style="top:56%; left:72%;" onclick="showInfo('Myanmar')"></div>
<div class="hotspot" style="top:61%; left:79%;" onclick="showInfo('Philippines')"></div>
<div class="hotspot" style="top:72%; left:77%;" onclick="showInfo('Timor-Leste')"></div>
<div class="hotspot" style="top:47%; left:66%;" onclick="showInfo('Northern Pakistan')"></div>

<!-- 美洲 -->
<div class="hotspot" style="top:54%; left:27%;" onclick="showInfo('Haiti')"></div>
<div class="hotspot" style="top:55%; left:22%;" onclick="showInfo('Guatemala')"></div>
<div class="hotspot" style="top:72%; left:34%;" onclick="showInfo('Brazil')"></div>
<div class="hotspot" style="top:78%; left:31%;" onclick="showInfo('Bolivia')"></div>

<!-- 中東 -->
<div class="hotspot" style="top:40%; left:55%;" onclick="showInfo('Syria')"></div>
<div class="hotspot" style="top:49%; left:58%;" onclick="showInfo('Yemen')"></div>

</div>

<p id="info" style="text-align:center; font-weight:bold;"></p>

<script>
function showInfo(msg) {
    document.getElementById("info").innerText = msg;
}
</script>

</body>
</html>
