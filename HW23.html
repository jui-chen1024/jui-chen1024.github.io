<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程師與設計師的協作作業</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f6f6f6; /* 設計稿背景色 */
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* 主容器，依據設計稿標註約 496px */
        .wrapper {
            width: 496px;
        }

        /* 頂部按鈕區域 */
        .header-actions {
            display: flex;
            justify-content: flex-end; /* 按鈕靠右 */
            margin-bottom: 8px;
            padding-right: 46px; /* 預留右側標註間距 */
        }

        /* 嚴格執行設計稿規格的按鈕 (h22/R8) */
        .spec-button {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            color: #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            padding: 0 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .spec-button:hover {
            background-color: #eeeeee;
        }

        /* 預覽圖片區域 (450x240) */
        .preview-image {
            width: 450px;
            height: 240px;
            background-image: url('https://picsum.photos/id/249/450/240'); /* 穩定的大橋示意圖 */
            background-size: cover;
            background-position: center;
            border: 1px solid #ddd;
            margin-bottom: 12px;
        }

        /* 詳細資訊框 (預設隱藏) */
        #details {
            width: 450px;
            background-color: #f3f3f3; /* 底部背景色 */
            border-top: 1px solid #cfddff; /* 藍色分隔線樣式 */
            padding: 12px;
            display: none; 
            box-sizing: border-box;
        }

        .info-row {
            font-size: 13px;
            margin: 6px 0;
            display: flex;
        }

        .info-label {
            color: #707070; /* 標籤淡灰色 */
            width: 80px;
        }

        .info-value {
            color: #2f2f2f; /* 內容深灰色 */
            flex: 1;
        }

        /* 特殊樣式：綠色背景的路徑文字 */
        .path-highlight {
            color: #0084ff;
            background-color: #e8f3ff;
            padding: 2px 4px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-actions">
        <button class="spec-button" onclick="toggleDetails()">查看資訊</button>
    </div>

    <div class="preview-image"></div>

    <div id="details">
        <div class="info-row">
            <span class="info-label">修改日期：</span>
            <span class="info-value">2017/10/12</span>
        </div>
        <div class="info-row">
            <span class="info-label">格式：</span>
            <span class="info-value">JPG</span>
        </div>
        <div class="info-row">
            <span class="info-label">大小：</span>
            <span class="info-value">466.97 KB</span>
        </div>
        <div class="info-row">
            <span class="info-label">路徑：</span>
            <span class="info-value path-highlight">\\designcenter.qnap.com.tw\DesignCenter\PM_RD 講放入\WEB\Stations\A_Image2PDF\v2\sample</span>
        </div>
    </div>
</div>

<script>
    function toggleDetails() {
        var detailsDiv = document.getElementById("details");
        if (detailsDiv.style.display === "none" || detailsDiv.style.display === "") {
            detailsDiv.style.display = "block";
        } else {
            detailsDiv.style.display = "none";
        }
    }
</script>

</body>
</html>
