<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Demo</title>

<style>
body {
    font-family: Roboto, sans-serif;
    padding: 40px;
}

/* 按鈕 */
.btn {
    height: 22px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid #212121;
    background-color: #ffffff;
    font-size: 13px;
    cursor: pointer;
}

/* 卡片 */
.card {
    margin-top: 20px;
    width: 450px;
}

/* 圖片 */
.image {
    width: 100%;
}

/* 詳細資訊 */
.detail {
    margin-top: 10px;
    padding: 15px;
    background-color: #f3f3f3;
    display: none;
}

/* 每一行 */
.item {
    margin-bottom: 10px;
    color: #555;
    font-size: 13px;
}
</style>

</head>

<body>

<button class="btn" onclick="toggleDetail()">詳細資訊</button>

<div class="card">
    <img class="image" src="https://picsum.photos/450/240">

    <div id="detailBox" class="detail">
        <div class="item">📅 日期：2017/10/12</div>
        <div class="item">📄 檔名：example.jpg</div>
        <div class="item">📦 大小：456 KB</div>
        <div class="item">🌐 URL：https://example.com</div>
    </div>
</div>

<script>
function toggleDetail() {
    let box = document.getElementById("detailBox");

    if (box.style.display === "block") {
        box.style.display = "none";
    } else {
        box.style.display = "block";
    }
}
</script>

</body>
</html>
