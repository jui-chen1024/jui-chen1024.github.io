<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程師與設計師的協作作業</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f6f6f6;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .wrapper {
            width: 496px;
        }

        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
            width: 450px; /* 對齊圖片寬度 */
        }

        .spec-button {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            color: #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            padding: 0 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-image {
            width: 450px;
            height: 240px;
            background-image: url('https://picsum.photos/id/249/450/240');
            background-size: cover;
            background-position: center;
            border: 1px solid #ddd;
            margin-bottom: 12px;
        }

        /* 詳細資訊框：加入 Scrolling Bar 功能 */
        #details {
            width: 450px;
            max-height: 150px; /* 固定最大高度，超過即顯示捲動條 */
            overflow-y: auto;  /* 垂直方向自動顯示捲動條 */
            background-color: #f3f3f3;
            border-top: 1px solid #cfddff;
            padding: 12px;
            display: none; 
            box-sizing: border-box;
        }

        /* 自定義捲動條樣式 (WebKit 瀏覽器) */
        #details::-webkit-scrollbar {
            width: 6px;
        }
        #details::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        #details::-webkit-scrollbar-thumb {
            background: #ccc; 
            border-radius: 10px;
        }
        #details::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .info-row {
            font-size: 13px;
            margin: 8px 0;
            display: flex;
        }

        .info-label {
            color: #707070;
            width: 80px;
            flex-shrink: 0;
        }

        .info-value {
            color: #2f2f2f;
            flex: 1;
        }

        .path-highlight {
            color: #0084ff;
            background-color: #e8f3ff;
            padding: 2px 4px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-actions">
        <button class="spec-button" onclick="toggleDetails()">查看資訊</button>
    </div>

    <div class="preview-image"></div>

    <div id="details">
        <div class="info-row">
            <span class="info-label">修改日期：</span>
            <span class="info-value">2017/10/12</span>
        </div>
        <div class="info-row">
            <span class="info-label">格式：</span>
            <span class="info-value">JPG</span>
        </div>
        <div class="info-row">
            <span class="info-label">大小：</span>
            <span class="info-value">466.97 KB</span>
        </div>
        <div class="info-row">
            <span class="info-label">路徑：</span>
            <span class="info-value path-highlight">\\designcenter.qnap.com.tw\DesignCenter\PM_RD 講放入\WEB\Stations\A_Image2PDF\v2\sample</span>
        </div>
        <div class="info-row">
            <span class="info-label">其他說明：</span>
            <span class="info-value">這是為了測試捲動條功能而增加的文字內容。當內容長度超過 150px 的時候，右側就會出現一條垂直的 scrolling bar，方便使用者往下翻閱。</span>
        </div>
    </div>
</div>

<script>
    function toggleDetails() {
        var detailsDiv = document.getElementById("details");
        if (detailsDiv.style.display === "none" || detailsDiv.style.display === "") {
            detailsDiv.style.display = "block";
        } else {
            detailsDiv.style.display = "none";
        }
    }
</script>

</body>
</html>
