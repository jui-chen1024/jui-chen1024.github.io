<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程師與設計師的協作作業</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f6f6f6; /* 配合設計稿背景色 */
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        /* 主容器 */
        .wrapper {
            width: 496px;
            position: relative;
        }

        /* 頂部按鈕容器 */
        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
            width: 450px; /* 寬度對齊圖片 */
        }

        /* 根據設計稿標註製作的按鈕 */
        .spec-button {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            color: #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            padding: 0 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none; /* 如果是 a 標籤則需要 */
        }

        /* 預覽圖片區域 */
        .preview-image {
            width: 450px;
            height: 240px;
            /* 引用你上傳的圖片檔名 */
            background-image: url('golden-gate.png'); 
            background-size: cover;
            background-position: center; /* 讓圖片居中顯示 */
            border: 1px solid #ddd;
            margin-bottom: 15px;
        }

        /* 詳細資訊框 */
        #details {
            width: 450px;
            background-color: #f3f3f3; /* 配合設計稿底部背景色 */
            border-top: 1px solid #cfddff; /* 模擬藍色分隔線 */
            padding: 10px;
            display: none; /* 點擊才顯示 */
            box-sizing: border-box;
        }

        .info-item {
            font-size: 13px;
            color: #2f2f2f;
            margin: 5px 0;
            line-height: 1.5;
            display: flex;
        }

        .info-label {
            color: #707070; /* 標籤顏色較淡 */
            min-width: 70px;
        }

        .info-value {
            color: #2f2f2f;
            word-break: break-all;
        }

        /* 特殊顏色：藍色路徑文字與背景 */
        .path-text {
            color: #0084ff;
            background-color: #e8f3ff;
            padding: 2px 4px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-actions">
        <button class="spec-button" onclick="toggleDetails()">查看資訊</button>
    </div>

    <div class="preview-image"></div>

    <div id="details">
        <div class="info-item">
            <span class="info-label">修改日期：</span>
            <span class="info-value">2017/10/12</span>
        </div>
        <div class="info-item">
            <span class="info-label">格式：</span>
            <span class="info-value">JPG</span>
        </div>
        <div class="info-item">
            <span class="info-label">大小：</span>
            <span class="info-value">466.97 KB</span>
        </div>
        <div class="info-item">
            <span class="info-label">路徑：</span>
            <span class="info-value path-text">\\designcenter.qnap.com.tw\DesignCenter\PM_RD...</span>
        </div>
    </div>
</div>

<script>
    function toggleDetails() {
        var x = document.getElementById("details");
        if (x.style.display === "none" || x.style.display === "") {
            x.style.display = "block";
        } else {
            x.style.display = "none";
        }
    }
</script>

</body>
</html>
