<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Demo</title>

<style>
body {
    font-family: Roboto, sans-serif;
    padding: 40px;
}

/* 按鈕樣式 */
.btn {
    height: 22px;
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid #212121;
    background-color: #ffffff;
    color: #212121;
    font-size: 13px;
    cursor: pointer;
}

/* hover 效果（加分） */
.btn:hover {
    background-color: #f0f0f0;
}

/* 圖片 */
.image {
    margin-top: 20px;
    width: 450px;
}

/* 詳細資訊區塊 */
.detail {
    margin-top: 20px;
    padding: 10px;
    background-color: #f3f3f3;
    display: none; /* 一開始隱藏 */
}
</style>

</head>

<body>

<!-- 按鈕 -->
<button class="btn" onclick="showDetail()">詳細資訊</button>

<!-- 圖片 -->
<div>
    <img class="image" src="https://picsum.photos/450/240" alt="image">
</div>

<!-- 詳細資訊 -->
<div id="detailBox" class="detail">
    <p>📅 日期：2017/10/12</p>
    <p>📄 檔名：example.jpg</p>
    <p>📦 大小：456 KB</p>
    <p>🌐 URL：https://example.com</p>
</div>

<script>
function showDetail() {
    document.getElementById("detailBox").style.display = "block";
}
</script>

</body>
</html>
