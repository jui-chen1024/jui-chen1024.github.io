<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px;
}

/* 外層 */
.container {
    display: flex;
    align-items: flex-start; /* 上對齊 */
    gap: 40px;
    width: 100%;
}

/* 左右圖片 */
.img-side {
    width: 33%;
    height: 300px;
    object-fit: cover;
}

/* 左圖圓角 */
.left {
    border-radius: 18px;
}

/* 中間圓 */
.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 10px solid #ccc;

    position: relative;
    transform: translateY(-75px); /* ⭐關鍵：剛好一半 */
    z-index: 10;
}
</style>

</head>

<body>

<div class="container">
    <img class="img-side left" src="https://picsum.photos/id/1015/600/400">

    <img class="circle" src="https://picsum.photos/id/1016/600/400">

    <img class="img-side" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
