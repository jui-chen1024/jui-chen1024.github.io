<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px;
    background-color: #fff;
}

/* 外層容器 */
.container {
    display: flex;
    align-items: flex-start; /* 👈 關鍵：讓上緣對齊 */
    justify-content: center;
    gap: 40px;
    width: 100%;
}

/* 左右圖片 */
.img-side {
    width: 33%;
    height: 300px;
    object-fit: cover;
}

/* 左圖圓角 */
.left {
    border-radius: 18px;
}

/* 中間圓形 */
.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 10px solid #ccc;

    position: relative;
    top: -50px; /* 👈 往上浮，調這個可以微調 */
    z-index: 10;
}
</style>

</head>

<body>

<div class="container">
    <!-- 左圖 -->
    <img class="img-side left" src="https://picsum.photos/id/1015/600/400">

    <!-- 中間圓 -->
    <img class="circle" src="https://picsum.photos/id/1016/600/400">

    <!-- 右圖 -->
    <img class="img-side" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
