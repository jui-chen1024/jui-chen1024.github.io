<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    margin: 0;
    padding-top: 80px;
    background: white;
}

/* 外層 */
.container {
    position: relative;
    width: 90%;
    margin: 0 auto;
    height: 300px;
}

/* 左右圖片 */
.big-img {
    width: 33%;
    height: 300px;              /* ⭐老師右圖有標300px */
    object-fit: cover;          /* ⭐不變形 */
}

/* 左圖 */
.left-img {
    position: absolute;
    left: 0;
    top: 0;
    border-radius: 18px;
}

/* 右圖 */
.right-img {
    position: absolute;
    right: 0;
    top: 0;
}

/* 中間圓 */
.circle-img {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0;

    width: 150px;               /* ⭐老師寫的 */
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #999;     /* 灰色外框 */
}
</style>

</head>

<body>

<div class="container">
    <img class="big-img left-img" src="https://picsum.photos/id/1015/600/400">
    
    <img class="circle-img" src="https://picsum.photos/id/1016/600/400">
    
    <img class="big-img right-img" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
