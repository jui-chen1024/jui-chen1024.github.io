<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    margin: 0;
    padding-top: 80px;
    background: white;
    display: flex;
    justify-content: center;
}

/* 外層 */
.container {
    display: flex;
    align-items: flex-start;
    gap: 20px; /* ⭐控制間距 */
}

/* 左右圖片（直的長方形） */
.big-img {
    width: 250px;       /* ⭐變窄 → 看起來是直的 */
    height: 300px;
    object-fit: cover;  /* ⭐不變形 */
}

/* 左圖圓角 */
.left-img {
    border-radius: 18px;
}

/* 中間圓 */
.circle-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #999;
}
</style>
</head>

<body>

<div class="container">
    <!-- 左圖（直的） -->
    <img class="big-img left-img" src="https://picsum.photos/400/600">

    <!-- 中間圓 -->
    <img class="circle-img" src="https://picsum.photos/400/600">

    <!-- 右圖（直的） -->
    <img class="big-img" src="https://picsum.photos/400/600">
</div>

</body>
</html>
