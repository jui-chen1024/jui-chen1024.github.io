<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

/* 外層容器 */
.container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    width: 100%;
}

/* 左右圖片 */
.img-side {
    width: 33%;
    height: 300px;
    object-fit: cover;
}

/* 左圖圓角 */
.left {
    border-radius: 18px;
}

/* 中間圓形 */
.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 8px solid #ccc; /* 加粗才像老師 */
    position: relative;
    z-index: 2;
}
</style>

</head>

<body>

<div class="container">
    <img class="img-side left" src="https://picsum.photos/id/1015/600/400">

    <img class="circle" src="https://picsum.photos/id/1016/600/400">

    <img class="img-side" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
