<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    margin: 0;
    padding-top: 80px;
    background: white;
}

/* 整個圖片區 */
.container {
    position: relative;
    width: 1050px;
    height: 300px;
    margin: 0 auto;
}

/* 左右大圖 */
.big-img {
    width: 390px;        /* 約 33% */
    height: 300px;
    object-fit: cover;   /* no distortion */
}

/* 左圖 */
.left-img {
    position: absolute;
    left: 0;
    top: 0;
    border-radius: 18px;
}

/* 右圖 */
.right-img {
    position: absolute;
    right: 0;
    top: 0;
}

/* 中間圓圖 */
.circle-img {
    position: absolute;
    left: 450px;         /* 壓在兩張圖中間 */
    top: 0;              /* 跟左右圖片上緣一樣高 */

    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #555;
    box-sizing: border-box;
}
</style>
</head>

<body>

<div class="container">
    <img class="big-img left-img" src="https://picsum.photos/id/1015/600/400">
    <img class="circle-img" src="https://picsum.photos/id/1016/600/400">
    <img class="big-img right-img" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
