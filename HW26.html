<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    margin: 0;
    padding-top: 80px;
    background: white;
}

/* 整體區塊 */
.container {
    position: relative;
    width: 900px;   /* ⭐縮小整體寬度 → 圖片靠近 */
    height: 300px;
    margin: 0 auto;
}

/* 左右圖片 */
.big-img {
    width: 300px;   /* ⭐固定寬度讓間距穩 */
    height: 300px;
    object-fit: cover;
}

/* 左圖 */
.left-img {
    position: absolute;
    left: 0;
    top: 0;
    border-radius: 18px;
}

/* 右圖 */
.right-img {
    position: absolute;
    right: 0;
    top: 0;
}

/* 中間圓 */
.circle-img {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0;

    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #555;
    background: white;
}
</style>
</head>

<body>

<div class="container">
    <img class="big-img left-img" src="https://picsum.photos/id/1015/600/400">
    
    <img class="circle-img" src="https://picsum.photos/id/1016/600/400">
    
    <img class="big-img right-img" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
