<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    padding: 40px;
    font-family: Arial;
}

/* 左圖 */
.img-left {
    width: 33%;
    border-radius: 18px;
    object-fit: cover; /* 不變形 */
}

/* 中間圓形 */
.img-circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #ccc;
}

/* 右圖 */
.img-right {
    width: 33%;
    height: 300px;
    object-fit: cover; /* 重點：裁切不變形 */
}
</style>

</head>

<body>

<img class="img-left" src="https://picsum.photos/id/1015/600/400">

<img class="img-circle" src="https://picsum.photos/id/1016/600/400">

<img class="img-right" src="https://picsum.photos/id/1015/600/400">

</body>
</html>
