<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    margin: 0;
    padding-top: 80px;
    background: white;
}

/* 整體圖片區 */
.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 25px; /* 圖片跟圓形的距離 */
}

/* 左右長方形圖片 */
.big-img {
    width: 390px;
    height: 300px;
    object-fit: cover; /* 不變形 */
}

/* 左圖圓角 */
.left-img {
    border-radius: 18px;
}

/* 中間圓形 */
.circle-img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #555;
    box-sizing: border-box;
}
</style>
</head>

<body>

<div class="container">
    <img class="big-img left-img" src="https://picsum.photos/id/1015/600/400">

    <img class="circle-img" src="https://picsum.photos/id/1016/600/400">

    <img class="big-img" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
