<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    display: flex;
    justify-content: center;
    padding: 60px;
    background-color: #fff;
}

/* 外層容器 */
.container {
    position: relative; /* ⭐關鍵 */
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    width: 80%;
}

/* 左右圖片 */
.img-side {
    width: 33%;
    height: 300px;
    object-fit: cover;
}

/* 左圖圓角 */
.left {
    border-radius: 18px;
}

/* 中間圓 */
.circle {
    position: absolute; /* ⭐關鍵 */
    left: 50%;
    transform: translateX(-50%);

    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 10px solid #ccc;

    top: 40px; /* ⭐這個才是關鍵位置（調這個） */
}
</style>

</head>

<body>

<div class="container">
    <img class="img-side left" src="https://picsum.photos/id/1015/600/400">

    <img class="circle" src="https://picsum.photos/id/1016/600/400">

    <img class="img-side" src="https://picsum.photos/id/1015/600/400">
</div>

</body>
</html>
