<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Styling</title>

<style>
body {
    margin: 0;
    padding-top: 80px;
    display: flex;
    justify-content: center;
}

/* 外層 */
.container {
    display: flex;
    align-items: flex-start;
    gap: 10px; /* ⭐更貼近 */
    width: 80%;
}

/* 左右圖片 */
.big-img {
    width: 33%;           /* ⭐老師要求 */
    height: 300px;        /* ⭐老師有標 */
    object-fit: cover;    /* ⭐不變形 */
}

/* 左圖圓角 */
.left-img {
    border-radius: 18px;
}

/* 中間圓 */
.circle-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #666; /* ⭐細一點比較像老師 */
}
</style>
</head>

<body>

<div class="container">
    <img class="big-img left-img" src="https://picsum.photos/400/600">

    <img class="circle-img" src="https://picsum.photos/400/600">

    <img class="big-img" src="https://picsum.photos/400/600">
</div>

</body>
</html>
