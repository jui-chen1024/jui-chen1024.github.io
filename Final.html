<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG 4 互動學習平台</title>
    <style>
        :root {
            --primary-blue: #2c7da0;
            --primary-green: #468c45;
            --light-gray: #f8f9fa;
            --white: #ffffff;
            --dark-text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--white); color: var(--dark-text); scroll-behavior: smooth; }

        nav {
            background: white; padding: 15px 8%; position: fixed; width: 100%; top: 0;
            z-index: 1000; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 20px; cursor: pointer; font-weight: bold; }

        section { padding: 100px 10%; min-height: 100vh; border-bottom: 1px solid #eee; }
        h2 { color: var(--primary-blue); margin-bottom: 30px; text-align: center; font-size: 2rem; }

        /* --- Quiz 樣式 --- */
        .quiz-container { background: var(--light-gray); padding: 30px; border-radius: 15px; max-width: 600px; margin: 0 auto; }
        .quiz-option { 
            background: white; border: 2px solid #ddd; padding: 15px; margin: 10px 0; 
            border-radius: 8px; cursor: pointer; transition: 0.3s; 
        }
        .quiz-option:hover { border-color: var(--primary-blue); background: #eefaff; }

        /* --- Region 樣式 --- */
        .region-map { 
            background: #e1f5fe; height: 300px; border-radius: 15px; 
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .hotspot {
            width: 20px; height: 20px; background: red; border-radius: 50%; 
            position: absolute; cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* --- Vote 樣式 --- */
        .vote-box { display: flex; justify-content: space-around; margin-top: 20px; }
        .vote-item { text-align: center; flex: 1; margin: 0 10px; }
        .bar-container { background: #eee; height: 200px; width: 40px; margin: 0 auto 10px; position: relative; border-radius: 5px; }
        .bar { background: var(--primary-green); width: 100%; position: absolute; bottom: 0; transition: height 0.5s; border-radius: 5px; }
        .vote-btn { padding: 10px; background: var(--primary-blue); color: white; border: none; border-radius: 5px; cursor: pointer; }

    </style>
</head>
<body>

<nav>
    <div style="color: var(--primary-blue); font-weight: bold;">SDG 4 INTERACTIVE</div>
    <ul>
        <li onclick="location.href='#quiz'">測驗 (Quiz)</li>
        <li onclick="location.href='#region'">地圖 (Region)</li>
        <li onclick="location.href='#vote'">投票 (Vote)</li>
    </ul>
</nav>

<!-- Quiz Section -->
<section id="quiz">
    <h2>知識小測驗</h2>
    <div class="quiz-container">
        <p id="question">Q: 下列哪一項不是 SDG 4 的核心目標？</p>
        <div class="quiz-option" onclick="checkAnswer(false)">普及高等教育</div>
        <div class="quiz-option" onclick="checkAnswer(true)">僅限城市居民受教</div>
        <div class="quiz-option" onclick="checkAnswer(false)">提升師資品質</div>
        <p id="feedback" style="margin-top: 15px; font-weight: bold;"></p>
    </div>
</section>

<!-- Region Section -->
<section id="region">
    <h2>全球資源缺乏區域</h2>
    <p style="text-align: center; margin-bottom: 20px;">點擊紅色閃爍點查看當地教育現況</p>
    <div class="region-map">
        <div class="hotspot" style="top: 40%; left: 20%;" onclick="showRegion('撒哈拉以南非洲：超過 30% 的學齡兒童失學。')"></div>
        <div class="hotspot" style="top: 50%; left: 60%;" onclick="showRegion('南亞地區：師資培訓嚴重不足。')"></div>
        <div style="font-weight: bold; color: #555;">[互動地圖示意區碼]</div>
    </div>
    <p id="region-info" style="text-align: center; margin-top: 20px; color: var(--primary-blue); font-weight: bold;"></p>
</section>

<!-- Vote Section -->
<section id="vote">
    <h2>你認為哪種解決方法最有效？</h2>
    <div class="vote-box">
        <div class="vote-item">
            <div class="bar-container"><div id="bar1" class="bar" style="height: 30%;"></div></div>
            <p>數位設備</p>
            <button class="vote-btn" onclick="addVote('bar1')">投票</button>
        </div>
        <div class="vote-item">
            <div class="bar-container"><div id="bar2" class="bar" style="height: 50%;"></div></div>
            <p>增加師資</p>
            <button class="vote-btn" onclick="addVote('bar2')">投票</button>
        </div>
        <div class="vote-item">
            <div class="bar-container"><div id="bar3" class="bar" style="height: 20%;"></div></div>
            <p>免費教科書</p>
            <button class="vote-btn" onclick="addVote('bar3')">投票</button>
        </div>
    </div>
</section>

<script>
    // Quiz Logic
    function checkAnswer(isWrong) {
        const f = document.getElementById('feedback');
        if(isWrong) {
            f.innerText = "正確！SDG 4 追求的是「公平」與「包容」，不能僅限於部分人群。";
            f.style.color = "green";
        } else {
            f.innerText = "再試一次，這也是 SDG 4 的重要部分。";
            f.style.color = "red";
        }
    }

    // Region Logic
    function showRegion(info) {
        document.getElementById('region-info').innerText = info;
    }

    // Vote Logic
    function addVote(id) {
        const bar = document.getElementById(id);
        let currentHeight = parseInt(bar.style.height);
        if(currentHeight < 100) {
            bar.style.height = (currentHeight + 5) + "%";
        }
    }
</script>

</body>
</html>
