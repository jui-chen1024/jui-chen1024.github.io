<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Layout</title>

<style>
body {
    margin: 0;
    background-color: #55a9df;
    font-family: Arial, sans-serif;
}

/* 外層白色框 */
.container {
    width: 80%;
    max-width: 900px;
    margin: 80px auto;
    padding: 20px;
    background-color: white;
    border-radius: 14px;
    box-sizing: border-box;
}

/* 綠色區 */
.header {
    height: 120px;
    background-color: #a8d43f;
    margin-bottom: 14px;
}

/* 藍色區 */
.content {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
}

.content div {
    height: 130px;
    background-color: #20b7c0;
    flex: 1;
}

/* 灰色區 */
.footer {
    display: flex;
    gap: 10px;
}

.footer div {
    height: 90px;
    background-color: #d9d9d9;
    flex: 1;
}

/* 小於 480px 時，改成左邊(a)那種直排 */
@media (max-width: 480px) {
    .container {
        width: 80%;
        margin: 40px auto;
    }

    .content {
        flex-direction: column;
    }

    .content div {
        height: 65px;
    }

    .footer {
        flex-wrap: wrap;
    }

    .footer div {
        flex: 0 0 calc(50% - 5px);
        height: 50px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header"></div>

    <div class="content">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="footer">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

</div>

</body>
</html>
