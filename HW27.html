<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exercise 27</title>

<style>

body{

    margin:0;

    padding:30px;

    background:#f5f5f5;

}

.wrapper{

    width:90%;

    max-width:900px;

    margin:auto;

    background:#4da6e8;

    padding:20px;

    box-sizing:border-box;

}

.phone{

    background:white;

    border-radius:10px;

    padding:10px;

}

/* 綠色區 */

.top{

    height:90px;

    background:#a9cf3c;

    margin-bottom:8px;

}

/* 藍色區 */

.middle{

    display:grid;

    gap:8px;

    margin-bottom:8px;

}

/* 灰色區 */

.bottom{

    display:grid;

    gap:8px;

}

/* 小於480px：左圖 */

.middle{

    grid-template-columns:1fr;

}

.middle div{

    height:55px;

    background:#16bccb;

}

.bottom{

    grid-template-columns:1fr 1fr;

}

.bottom div{

    height:45px;

    background:#dce4e8;

}

/* 大於等於480px：右圖 */

@media screen and (min-width:480px){

.middle{

    grid-template-columns:1fr 1fr 1fr;

}

.middle div{

    height:120px;

}

.bottom{

    grid-template-columns:1fr 1fr 1fr 1fr;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="phone">

<div class="top"></div>

<div class="middle">

<div></div>

<div></div>

<div></div>

</div>

<div class="bottom">

<div></div>

<div></div>

<div></div>

<div></div>

</div>

</div>

</div>

</body>

</html>
