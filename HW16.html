<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HW16</title>

    <style>
        body{
            margin:0;
            background:#f2f2f2;
            font-family:"Times New Roman", serif;
        }

        .container{
            width:820px;
            margin:60px auto;
            background:white;
            padding:28px 34px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }

        .box{
            font-size:72px;
            font-weight:bold;
            color:black;
            margin-bottom:34px;
            box-sizing:border-box;
        }

        /* 第一個 */
        .box1{
            background:#e7f6f6;
            border:12px double #de6d5e;
            padding:18px;
        }

        /* 第二個 */
        .box2{
            background:#ecec2f;
            border:5px solid #7b97c8;
            border-radius:22px;
            padding:18px;
        }

        /* 第三個 */
        .box3{
            position:relative;
            background:#5ea25d;
            padding:20px;
            margin-bottom:0;
            overflow:hidden;
        }

        /* 不重疊圓點邊框 */
        .box3::before{
            content:"";
            position:absolute;
            inset:0;
            pointer-events:none;

            background:
                /* 上 */
                radial-gradient(circle, #6c716b 0 6px, transparent 7px) top / 30px 15px repeat-x,
                /* 下 */
                radial-gradient(circle, #6c716b 0 6px, transparent 7px) bottom / 30px 15px repeat-x,
                /* 左 */
                radial-gradient(circle, #6c716b 0 6px, transparent 7px) left / 15px 30px repeat-y,
                /* 右 */
                radial-gradient(circle, #6c716b 0 6px, transparent 7px) right / 15px 30px repeat-y;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box box1">Hello World</div>
        <div class="box box2">Hello World</div>
        <div class="box box3">Hello World</div>
    </div>
</body>
</html>
