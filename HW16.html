<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HW16</title>
    <style>
        body {
            font-family: "Times New Roman";
        }

        .container {
            width: 800px;
            margin: 50px auto;
            padding: 20px;
            box-shadow: 3px 3px 10px gray;
        }

        .box1 {
            font-size: 48px;
            font-weight: bold;
            background-color: #e6ffff;
            border: 10px double red;
            padding: 10px;
            margin-bottom: 30px;
        }

        .box2 {
            font-size: 48px;
            font-weight: bold;
            background-color: yellow;
            border: 4px solid blue;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 30px;
        }

        .box3 {
            font-size: 48px;
            font-weight: bold;
            background-color: green;
            border: 8px dotted gray;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box1">Hello World</div>
        <div class="box2">Hello World</div>
        <div class="box3">Hello World</div>
    </div>
</body>
</html>
