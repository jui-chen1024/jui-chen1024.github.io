<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Homework</title>
    <style>
        body {
            background-color: white;
            font-family: "Times New Roman", serif;
        }

        .container {
            width: 800px;
            margin: 50px auto;
            padding: 30px 20px;
            background-color: white;
            box-shadow: 3px 3px 10px gray;
        }

        .box1 {
            font-size: 48px;
            font-weight: bold;
            color: black;
            background-color: #e6ffff;
            border: 10px double #e66b5b;
            padding: 10px 15px;
            margin-bottom: 35px;
        }

        .box2 {
            font-size: 48px;
            font-weight: bold;
            color: black;
            background-color: yellow;
            border: 4px solid #6f9dcf;
            border-radius: 18px;
            padding: 10px 15px;
            margin-bottom: 35px;
        }

        .box3 {
            font-size: 48px;
            font-weight: bold;
            color: black;
            background-color: #4fa15a;
            border: 8px dotted #5f6b5f;
            padding: 10px 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">Hello World</div>
        <div class="box2">Hello World</div>
        <div class="box3">Hello World</div>
    </div>
</body>
</html>
