<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HW16</title>

    <style>
        body {
            font-family: "Times New Roman";
            background-color: white;
        }

        .container {
            width: 800px;
            margin: 50px auto;
            padding: 20px;
            box-shadow: 3px 3px 10px gray;
        }

        /* 第一個：雙框 */
        .box1 {
            font-size: 48px;
            font-weight: bold;
            background-color: #e6ffff;
            border: 10px double #e66b5b;
            padding: 10px;
            margin-bottom: 30px;
        }

        /* 第二個：圓角 */
        .box2 {
            font-size: 48px;
            font-weight: bold;
            background-color: yellow;
            border: 4px solid #6f9dcf;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 30px;
        }

        /* 第三個：圓點邊框 */
        .box3 {
            font-size: 48px;
            font-weight: bold;
            background-color: #4fa15a;
            padding: 10px;

            border: 10px solid transparent;
            border-image: radial-gradient(circle, gray 40%, transparent 41%) 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box1">Hello World</div>
        <div class="box2">Hello World</div>
        <div class="box3">Hello World</div>
    </div>
</body>
</html>
