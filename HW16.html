<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW16</title>
    <style>
        body{
            margin:0;
            background:#f2f2f2;
            font-family:"Times New Roman", serif;
        }

        .container{
            width:820px;
            margin:60px auto;
            background:white;
            padding:28px 34px;
            box-shadow:0 4px 14px rgba(0,0,0,0.25);
        }

        .box{
            font-size:72px;
            font-weight:bold;
            color:black;
            box-sizing:border-box;
            margin-bottom:34px;
        }

        .box1{
            background:#eaf7f7;
            border:12px double #de6d5e;
            padding:18px 20px;
        }

        .box2{
            background:#ecec2f;
            border:5px solid #8aa0c8;
            border-radius:24px;
            padding:18px 20px;
        }

        .box3{
            position:relative;
            background:#5ea25d;
            padding:20px 22px;
            margin-bottom:0;
            color:black;
            overflow:hidden;
        }

        .box3 span{
            position:relative;
            z-index:2;
        }

        /* 上邊點點：左右各留 16px，避免撞到側邊 */
        .box3::before{
            content:"";
            position:absolute;
            top:0;
            left:16px;
            right:16px;
            height:16px;
            z-index:1;
            background:
                radial-gradient(circle, #6c716b 0 6px, transparent 7px)
                0 0 / 32px 16px repeat-x;
            pointer-events:none;
        }

        /* 下邊點點：左右各留 16px，避免撞到側邊 */
        .box3::after{
            content:"";
            position:absolute;
            bottom:0;
            left:16px;
            right:16px;
            height:16px;
            z-index:1;
            background:
                radial-gradient(circle, #6c716b 0 6px, transparent 7px)
                0 0 / 32px 16px repeat-x;
            pointer-events:none;
        }

        .dot-left,
        .dot-right{
            position:absolute;
            top:0;
            bottom:0;
            width:16px;
            z-index:1;
            pointer-events:none;
        }

        .dot-left{
            left:0;
            background:
                radial-gradient(circle, #6c716b 0 6px, transparent 7px)
                0 0 / 16px 32px repeat-y;
        }

        .dot-right{
            right:0;
            background:
                radial-gradient(circle, #6c716b 0 6px, transparent 7px)
                0 0 / 16px 32px repeat-y;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">Hello World</div>
        <div class="box box2">Hello World</div>
        <div class="box box3">
            <div class="dot-left"></div>
            <div class="dot-right"></div>
            <span>Hello World</span>
        </div>
    </div>
</body>
</html>
