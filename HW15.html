<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World Style</title>

<style>
body {
    background-color: #eee;
    font-family: Arial, sans-serif;
}

.box1 {
    background-color: #b7d3d9;
    border: 5px double red;
    padding: 10px;
    margin: 20px;
    width: 300px;
    font-size: 30px;
    font-weight: bold;
}

.box2 {
    background-color: yellow;
    border: 3px solid #6a5acd;
    border-radius: 15px;
    padding: 10px;
    margin: 20px;
    width: 300px;
    font-size: 30px;
    font-weight: bold;
}

.box3 {
    background-color: #2e8b57;
    color: #003300;
    border:5px dotted gray;
    padding: 10px;
    margin: 20px;
    width: 300px;
    font-size: 30px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="box1">Hello World</div>
<div class="box2">Hello World</div>
<div class="box3">Hello World</div>

</body>
</html>
