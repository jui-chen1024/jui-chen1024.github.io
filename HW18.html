<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HW18</title>

    <style>
        body{
            margin:0;
            background:#f2f2f2;
            font-family:"Times New Roman", serif;
        }

        .container{
            width:900px;
            margin:60px auto;
            background:white;
            padding:18px 22px 20px 22px;
            box-shadow:0 4px 14px rgba(0,0,0,0.25);
        }

        /* 第一行 */
        .heading1{
            font-size:64px;
            font-weight:700;
            margin-bottom:34px;

            text-decoration: overline;
            text-decoration-thickness:5px;

            text-shadow:2px 2px 0 #d8b6c8;
        }

        /* 第二行 */
        .heading2{
            font-size:56px;
            font-weight:700;
            font-style:italic;

            border:2px solid black;
            box-shadow:4px 4px 0 #c9c300;

            padding:6px 10px;
            margin-bottom:34px;
        }

        /* 第三行 */
        .heading3{
            font-size:34px;
            font-weight:700;
            font-style:italic;
            text-align:right;

            text-decoration: underline;
            text-decoration-thickness:3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="heading1">This is heading 1</div>
        <div class="heading2">This is heading 2</div>
        <div class="heading3">This is heading 3</div>
    </div>
</body>
</html>
