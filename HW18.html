<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW18</title>
    <style>
        body{
            margin:0;
            background:#f2f2f2;
            font-family:"Times New Roman", serif;
        }

        .container{
            width:900px;
            margin:60px auto;
            background:white;
            padding:18px 22px 20px 22px;
            box-shadow:0 4px 14px rgba(0,0,0,0.25);
            box-sizing:border-box;
        }

        .heading1{
            font-size:64px;
            font-weight:700;
            line-height:1;
            margin:0 0 34px 0;
            display:inline-block;
            padding-bottom:2px;
            border-bottom:5px solid black;
            text-shadow:2px 2px 0 #d8b6c8;
        }

        .heading2{
            font-size:56px;
            font-weight:700;
            font-style:italic;
            line-height:1.05;
            margin:0 0 34px 0;
            border:4px solid #a3a300;
            padding:6px 10px 5px 10px;
        }

        .heading3{
            font-size:34px;
            font-weight:700;
            font-style:italic;
            line-height:1;
            margin:0;
            text-align:right;
            text-decoration:underline;
            text-decoration-thickness:3px;
            text-underline-offset:3px;
            padding-right:14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading1">This is heading 1</div>
        <div class="heading2">This is heading 2</div>
        <div class="heading3">This is heading 3</div>
    </div>
</body>
</html>
