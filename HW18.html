<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW18</title>
    <style>
        body{
            margin: 0;
            background-color: #f2f2f2;
            font-family: "Times New Roman", serif;
        }

        .container{
            width: 900px;
            margin: 60px auto;
            background-color: white;
            padding: 20px 25px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }

        .heading1{
            font-size: 64px;
            font-weight: bold;
            color: black;
            text-decoration: underline;
            text-decoration-thickness: 4px;
            text-underline-offset: 6px;
            margin-bottom: 35px;
        }

        .heading2{
            font-size: 52px;
            font-weight: bold;
            font-style: italic;
            color: black;
            border: 4px solid #b7b300;
            padding: 6px 10px;
            margin-bottom: 35px;
        }

        .heading3{
            font-size: 42px;
            font-weight: bold;
            font-style: italic;
            color: black;
            text-decoration: underline;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading1">This is heading 1</div>
        <div class="heading2">This is heading 2</div>
        <div class="heading3">This is heading 3</div>
    </div>
</body>
</html>
